{# Compact inline actions — avoids dropdown overlap in scrollable tables #}
<div class="admin-row-actions" role="group" aria-label="User actions">
  {% if not u.is_super_admin %}
  <form action="{{ url_for('admin_routes.set_user_super_admin', user_id=u.id) }}?status={{ status or '' }}" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="status" value="{{ status or '' }}">
    <input type="hidden" name="action" value="grant">
    <button type="submit" class="admin-action-btn" title="Make Super Admin">
      <i class="fas fa-user-shield"></i>
    </button>
  </form>
  {% else %}
  <form action="{{ url_for('admin_routes.set_user_super_admin', user_id=u.id) }}?status={{ status or '' }}" method="POST"
        onsubmit="return confirm('Remove Super Admin access?');">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="status" value="{{ status or '' }}">
    <input type="hidden" name="action" value="revoke">
    <button type="submit" class="admin-action-btn admin-action-btn-warn" title="Remove Super Admin">
      <i class="fas fa-user-minus"></i>
    </button>
  </form>
  {% endif %}

  {% if u.is_verified %}
  <form action="{{ url_for('admin_routes.deactivate_user', user_id=u.id) }}" method="POST"
        onsubmit="return confirm('Deactivate this user?');">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="status" value="{{ status or '' }}">
    <button type="submit" class="admin-action-btn admin-action-btn-warn" title="Deactivate">
      <i class="fas fa-user-slash"></i>
    </button>
  </form>
  {% else %}
  <form action="{{ url_for('admin_routes.activate_user', user_id=u.id) }}" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="status" value="{{ status or '' }}">
    <button type="submit" class="admin-action-btn admin-action-btn-ok" title="Activate">
      <i class="fas fa-user-check"></i>
    </button>
  </form>
  {% endif %}

  <form action="{{ url_for('admin_routes.delete_user', user_id=u.id) }}" method="POST"
        onsubmit="return confirm('Delete this user permanently?');">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="status" value="{{ status or '' }}">
    <button type="submit" class="admin-action-btn admin-action-btn-danger" title="Delete user">
      <i class="fas fa-trash-alt"></i>
    </button>
  </form>
</div>
