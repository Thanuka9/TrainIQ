services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Uncomment and configure when running the app in Docker:
  # web:
  #   build: .
  #   ports:
  #     - "5000:5000"
  #   env_file: .env
  #   environment:
  #     REDIS_URI: redis://redis:6379
  #   depends_on:
  #     - redis

volumes:
  redis_data:
