# Production-like full stack for staging / single-host deploy.
# Copy .env.production.example → .env and fill secrets before: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trainiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-collective_rcm}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trainiq} -d ${POSTGRES_DB:-collective_rcm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    build: .
    env_file: .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-trainiq}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-collective_rcm}
      REDIS_URI: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017
      RUN_SCHEDULER: "false"
    command: flask db upgrade
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build: .
    env_file: .env
    environment:
      FLASK_ENV: production
      SERVICE_MODE: web
      RUN_SCHEDULER: "false"
      EVENT_BUS_CONSUMER: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-trainiq}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-collective_rcm}
      REDIS_URI: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017
      SESSION_COOKIE_SECURE: "false"
    command: gunicorn -c gunicorn.conf.py app:app
    ports:
      - "${WEB_PORT:-5000}:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  platform:
    build: .
    env_file: .env
    environment:
      FLASK_ENV: production
      SERVICE_MODE: platform
      RUN_SCHEDULER: "false"
      EVENT_BUS_CONSUMER: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-trainiq}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-collective_rcm}
      REDIS_URI: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017
      SESSION_COOKIE_SECURE: "false"
    command: gunicorn -c gunicorn.conf.py app:app
    ports:
      - "${PLATFORM_PORT:-5001}:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  ops-worker:
    build: .
    env_file: .env
    environment:
      FLASK_ENV: production
      SERVICE_MODE: full
      RUN_SCHEDULER: "true"
      OPS_WORKER_MODE: "true"
      EVENT_BUS_CONSUMER: "true"
      EVENT_BUS_ENABLED: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-trainiq}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-collective_rcm}
      REDIS_URI: redis://redis:6379/0
      MONGO_URI: mongodb://mongo:27017
    command: python scripts/run_ops_worker.py
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  redis_data:
