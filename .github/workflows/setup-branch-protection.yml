# One-time setup: require green CI before merging to main.
# Run manually from GitHub Actions after this workflow is on main.
# Requires repo admin + `gh` auth with admin:repo_hook or repo scope.

name: Setup branch protection

on:
  workflow_dispatch:

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - name: Require CI status check on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          # Reusable workflow job appears as "test / Pytest" in GitHub checks.
          CHECK="test / Pytest"
          echo "Setting branch protection on main for check: $CHECK"
          gh api \
            -X PUT \
            "repos/${REPO}/branches/main/protection" \
            -H "Accept: application/vnd.github+json" \
            -f required_status_checks[strict]=true \
            -f required_status_checks[contexts][]="$CHECK" \
            -f enforce_admins=false \
            -f required_pull_request_reviews=null \
            -f restrictions=null \
            -f allow_force_pushes=false \
            -f allow_deletions=false \
            2>&1 || {
              echo "::warning::Could not set branch protection automatically."
              echo "Enable manually: Settings → Branches → main → Require status checks → select 'test / Pytest'"
              exit 0
            }
          echo "Branch protection updated for main."
