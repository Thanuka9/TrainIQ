# Build, test, and deploy TrainIQ to Azure Web App (Production).
# Docs: https://aka.ms/python-webapps-actions

name: Deploy to Azure — Collective-Intranet

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-collective-intranet
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml

  build:
    name: Build release artifact
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (verify lockfile)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment zip
        run: |
          zip -r release.zip . \
            -x "*.git*" \
            -x "*__pycache__/*" \
            -x "*.pyc" \
            -x "venv/*" \
            -x ".venv/*" \
            -x "tests/*" \
            -x "instance/*" \
            -x ".env" \
            -x ".env.*" \
            -x "*.md" \
            -x "test_output.txt" \
            -x "ai_feature_strategy.md" \
            -x "walkthrough.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 7

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: Collective-Intranet
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F05DBC2AFB014991B7CABF6FA5CEF051 }}
