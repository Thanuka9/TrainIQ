name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - "cursor/**"
      - "feature/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml
